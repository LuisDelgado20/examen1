<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>crear</title>
</head>
<body class="container mt-5">
<div class="card shadow-sm mx-auto" style="max-width: 600px;">
    <div class="card-header bg-success text-white"><h5>Registrar Nuevo Libro</h5></div>
    <div class="card-body">
        <form>
            <div class="mb-3">
                <label class="form-label">ID del Libro</label>
                <input type="number" class="form-control" placeholder="Ej. 11">
            </div>
            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" class="form-control" placeholder="Ingrese el título">
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">Autor</label>
                    <input type="text" class="form-control" placeholder="Nombre del autor">
                </div>
                <div class="col">
                    <label class="form-label">Año de Publicación</label>
                    <input type="number" class="form-control" placeholder="AAAA">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Editorial</label>
                <input type="text" class="form-control" placeholder="Nombre de la editorial">
            </div>
            <div class="d-flex justify-content-end gap-2">
                <a href="lista.html" class="btn btn-light">Cancelar</a>
                <button type="submit" class="btn btn-success">Guardar Libro</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
